name: Feature Request
description: Structured feature work item for Agentic OS
title: "[Feature]: "
labels: ["type:feature", "state:backlog"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are we solving?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope?
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
      description: What are we explicitly not doing?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Use clear pass/fail criteria.
    validations:
      required: true

  - type: textarea
    id: test_scenarios
    attributes:
      label: Test Scenarios
      description: Include happy path and failure path.
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk Level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
